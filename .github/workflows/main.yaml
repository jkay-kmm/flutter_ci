name: Test, Build and Release apk
on: push
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Cập nhật lên Java 17 chuẩn cho Android hiện đại

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Tự động lấy bản Flutter ổn định mới nhất thay vì fix cứng một phiên bản cũ

      - run: flutter pub get
      - run: flutter test
      - run: flutter build apk --release # Đổi thành build release thay vì debug để có app chuẩn

      - name: Create a Release APK
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/*.apk" # Cập nhật lại đường dẫn chứa file APK của Flutter bản mới
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }} # Tự động lấy tên tag bạn vừa push để đặt tên cho bản Release